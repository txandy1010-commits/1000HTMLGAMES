<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="width=device-width, initial-scale=1.0">
    <title>Global Speed Math Arcade</title>
    <style>
        /* Retro Arcade Terminal Theme */
        body {
            background-color: #111;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin-top: 20px;
        }

        .nav-container {
            margin-bottom: 20px;
        }

        a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }

        #game-container {
            border: 4px dashed #00ff66;
            background-color: #222;
            padding: 30px;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 0 15px #00ff66;
            max-width: 450px;
            width: 90%;
        }

        button {
            background-color: #00ff66;
            color: #000;
            border: 2px solid #fff;
            padding: 8px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #fff;
            color: #000;
        }

        input {
            background-color: #000;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            width: 100px;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            outline: none;
        }

        #leaderboard-box {
            max-width: 320px;
            margin: 20px auto 0 auto;
            text-align: left;
            border: 2px solid #00ff66;
            background-color: #000;
            padding: 15px;
            border-radius: 8px;
        }

        #leaderboard-box h3 {
            text-align: center;
            margin-top: 0;
            color: #ffff00;
        }

        ul, ol {
            color: #fff;
            padding-left: 25px;
        }

        li {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html">&larr; Back Home</a>
    </div>

    <div id="game-container">
        <h2>SPEED MATH</h2>

        <div>
            <button onclick="setDifficulty(10)">Easy</button>
            <button onclick="setDifficulty(50)">Medium</button>
            <button onclick="setDifficulty(100)">Hard</button>
        </div>

        <p style="color: #ff3333; font-weight: bold; font-size: 24px; text-shadow: 0 0 5px #ff3333;">
            Time Left: <span id="timer">5</span>s
        </p>
        
        <h1 style="font-size: 2.5rem; text-shadow: 0 0 10px #00ff66;">
            <span id="num1">5</span> + <span id="num2">7</span> = ?
        </h1>

        <input type="number" id="answer" autocomplete="off" onkeydown="if(event.key==='Enter') checkAnswer();">
        <button onclick="checkAnswer()" style="font-size: 20px; padding: 7px 20px;">Go</button>

        <p style="font-size: 18px; font-weight: bold; color: #fff;">Your Current Score: <span id="score">0</span></p>
        
        <hr style="border: 1px dashed #00ff66; margin: 20px auto;">
        
        <div id="leaderboard-box">
            <h3>🌐 Global Top 10</h3>
            <ol id="leaderboard-list">
                <li>Loading global scores...</li>
            </ol>
        </div>
    </div>

    <script src="https://unpkg.com/lootlocker-js-sdk/dist/lootlocker.js"></script>
    
    <script>
        // --- 1. CONFIGURATION ---
        const GAME_API_KEY = "dev_7565c7e257234f52ac5c76b1e86c7573"; 
        const LEADERBOARD_ID = "speed";

        let n1, n2, score = 0, timeLeft = 5, timer, maxRange = 10;

        // Initialize connection to database
        LootLocker.initialize(GAME_API_KEY, "0.0.0.1", "development");
        
        LootLocker.startGuestSession("", (response) => {
            if (response.success) {
                console.log("Connected to LootLocker!");
                fetchGlobalLeaderboard();
            } else {
                document.getElementById("leaderboard-list").innerHTML = "<li>Unable to connect to database.</li>";
            }
        });

        nextQuestion();
        startTimer();

        // --- 2. GAME MECHANICS ---
        function setDifficulty(range) {
            maxRange = range;
            score = 0;
            document.getElementById("score").textContent = score;
            nextQuestion();
            startTimer();
        }

        function nextQuestion() {
            n1 = Math.floor(Math.random() * maxRange) + 1;
            n2 = Math.floor(Math.random() * maxRange) + 1;
            document.getElementById("num1").textContent = n1;
            document.getElementById("num2").textContent = n2;
            document.getElementById("answer").value = ""; 
            document.getElementById("answer").focus();
        }

        function startTimer() {
            clearInterval(timer); 
            timeLeft = 5; 
            document.getElementById("timer").textContent = timeLeft;

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleGameOver();
                }
            }, 1000);
        }

        function checkAnswer() {
            let userAnswer = parseInt(document.getElementById("answer").value);
            if (userAnswer === (n1 + n2)) {
                score++;
                document.getElementById("score").textContent = score;
                nextQuestion();
                startTimer(); 
            } else {
                clearInterval(timer);
                handleGameOver();
            }
        }

        // --- 3. DATABASE CALLS ---
        function handleGameOver() {
            alert("Game over! Final Score: " + score);
            
            if (score > 0) {
                let name = prompt("You made the board! Enter your name:");
                if (name) {
                    LootLocker.setPlayerName({ name: name }, (nameResponse) => {
                        if (nameResponse.success) {
                            LootLocker.submitScore({ leaderboardKey: LEADERBOARD_ID, score: score }, (submitResponse) => {
                                fetchGlobalLeaderboard(); 
                            });
                        } else {
                            LootLocker.submitScore({ leaderboardKey: LEADERBOARD_ID, score: score }, () => {
                                fetchGlobalLeaderboard();
                            });
                        }
                    });
                }
            }
            
            score = 0;
            document.getElementById("score").textContent = score;
            nextQuestion();
            startTimer();
        }

        function fetchGlobalLeaderboard() {
            LootLocker.getLeaderboard({ leaderboardKey: LEADERBOARD_ID, count: 10 }, (response) => {
                const list = document.getElementById("leaderboard-list");
                list.innerHTML = ""; 
                
                if (response.success && response.items && response.items.length > 0) {
                    response.items.forEach(item => {
                        let name = "Anonymous";
                        if (item.player && item.player.name) {
                            name = item.player.name;
                        }
                        
                        let row = document.createElement("li");
                        row.innerHTML = `<b>${name}</b> - ${item.score} pts`;
                        list.appendChild(row);
                    });
                } else {
                    list.innerHTML = "<li>No global high scores yet!</li>";
                }
            });
        }
    </script>
</body>
</html>
