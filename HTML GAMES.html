<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="width=device-width, initial-scale=1.0">
    <title>HTML Games</title>
</head>
<body>
    <a href="index.html">&larr; Back to Home Page</a>
    <br><br>

    <button id="start-game-btn" onclick="revealGame()" style="padding: 15px 30px; font-size: 18px;">
       Click to Play Cookie Clicker (My Version)
    </button> 
<!-- def use css to make the stuff look cooler maybe a retro game style? maybe make button bigger?????? -->
    <div id="game-container" style="display: none; margin-top: 20px;">
        <h2>Cookie Clicker</h2>
        <p>Click the cookie to earn cookies!</p>
        <button id="cookie-btn" style="padding: 20px 40px; font-size: 24px;">🍪</button> 
        <p>Cookies: <span id="cookie-count">0</span></p>
        <br><br>
        <button id="upgrade-btn" style="padding: 10px;">Buy Upgrade (Cost: <span id="upgrade-cost">15</span>)</button>
        <p>Current Click Power: <span id="click-power">1</span></p>
    </div>

    <script>
        let cookieCount = 0; // maybe secret code to set cookie to inf? and maybe a less powerfull one I can show people who want to cheat?
let clickPower = 1;
let upgradeCost = 15;

function revealGame() {
    document.getElementById('game-container').style.display = 'block';
    document.getElementById('start-game-btn').style.display = 'none';
}


document.getElementById('cookie-btn').addEventListener('click', () => {
    cookieCount += clickPower; 
    document.getElementById('cookie-count').textContent = cookieCount;
}); 


document.getElementById('upgrade-btn').addEventListener('click', () => {
    if (cookieCount >= upgradeCost) {
        cookieCount -= upgradeCost;
        clickPower += 1;
        upgradeCost = Math.floor(upgradeCost * 1.5);
        
        document.getElementById('cookie-count').textContent = cookieCount;
        document.getElementById('upgrade-cost').textContent = upgradeCost;
        document.getElementById('click-power').textContent = clickPower;
    } else {
        alert("Not enough cookies!"); //maybe add an alert loop if the player is usng an auto clicker?
    }
});
 </script>
</body> </html>
